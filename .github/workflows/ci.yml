name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify native version matches package.json
        run: npm run version:verify

      - name: Lint, typecheck, test
        run: npm run validate

  android_build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: >-
            tools
            platform-tools
            platforms;android-35
            build-tools;35.0.0
            ndk;27.1.12297006

      - name: Assemble debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Android debug APK
        uses: actions/upload-artifact@v4
        with:
          name: gcs-android-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14

  ios_build:
    runs-on: macos-latest
    env:
      LANG: en_US.UTF-8
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install CocoaPods
        run: |
          gem install cocoapods --user-install -N
          echo "$(ruby -e 'puts Gem.user_dir')/bin" >> "$GITHUB_PATH"

      - name: Pod install
        working-directory: ios
        run: pod install

      - name: Build iOS (Simulator)
        run: |
          set -eo pipefail
          # Pick an available iPhone simulator by UDID (json shape varies by Xcode).
          # Validates dict/list entries before iterating — avoids Python exceptions on CI.
          DEST="$(python3 - <<'PY'
          import json, subprocess, sys
          raw = subprocess.check_output(
              ["xcrun", "simctl", "list", "devices", "available", "-j"],
              text=True,
          )
          data = json.loads(raw)
          # Prefer newest runtime order (dict iteration order is runtime id).
          for _runtime, devs in data.get("devices", {}).items():
              if not isinstance(devs, list):
                  continue
              for d in devs:
                  if not isinstance(d, dict):
                      continue
                  if d.get("isAvailable") is False:
                      continue
                  name = d.get("name") or ""
                  udid = d.get("udid")
                  if "iPhone" in name and udid:
                      print(f"id={udid}")
                      sys.exit(0)
          print("No available iPhone simulator found", file=sys.stderr)
          sys.exit(1)
          PY
          )"
          echo "xcodebuild destination: $DEST"
          xcodebuild \
            -workspace ios/GCS.xcworkspace \
            -scheme GCS \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "$DEST" \
            -derivedDataPath ios/build-ci \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            build

      - name: Zip app bundle
        run: |
          cd ios/build-ci/Build/Products/Debug-iphonesimulator
          zip -ry "$GITHUB_WORKSPACE/gcs-ios-simulator.zip" GCS.app

      - name: Upload iOS simulator app
        uses: actions/upload-artifact@v4
        with:
          name: gcs-ios-simulator
          path: gcs-ios-simulator.zip
          retention-days: 14
