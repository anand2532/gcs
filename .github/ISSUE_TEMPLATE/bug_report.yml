name: Bug report
description: Something is broken or behaves incorrectly
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Use this for reproducible defects. For broader risks or tech debt, use **Problem or risk**.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong in one or two sentences.
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Android
        - iOS
        - Both / unsure
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Numbered steps; include build flavor or script if relevant (`npm run android`, etc.).
      placeholder: "1. ...\n2. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: metro
    attributes:
      label: Metro / adb context (if applicable)
      description: Port (8081/8082), physical device vs emulator, `adb reverse` issues, etc.
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logcat, Metro output, or attach screenshots.
